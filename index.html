<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Lógica - IBM Watson</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <div class="header-controls">
        <h1>Calculadora Lógica</h1>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Alternar tema">
            <span id="themeIcon">🌙</span>
        </button>
    </div>
    
    <div class="input-group">
        <input type="text" id="formulaInput" placeholder="Digite uma fórmula lógica..." readonly>
    </div>

    <div class="keypad">
        <!-- Variáveis -->
        <button class="btn" onclick="add('P')">P</button>
        <button class="btn" onclick="add('Q')">Q</button>
        <button class="btn" onclick="add('R')">R</button>
        <button class="btn" onclick="add('S')">S</button>
        <button class="btn btn-action" onclick="del()">DEL</button>
        <button class="btn btn-clear" onclick="clearAll()">AC</button>

        <!-- Mais Variáveis -->
        <button class="btn" onclick="add('A')">A</button>
        <button class="btn" onclick="add('B')">B</button>
        <button class="btn" onclick="add('C')">C</button>
        <button class="btn" onclick="add('D')">D</button>
        <button class="btn" onclick="add('E')">E</button>
        <button class="btn" onclick="add('F')">F</button>

        <!-- Operadores -->
        <button class="btn btn-op" onclick="add('¬')">¬</button>
        <button class="btn btn-op" onclick="add('∧')">∧</button>
        <button class="btn btn-op" onclick="add('∨')">∨</button>
        <button class="btn btn-op" onclick="add('⊻')">⊻</button>
        <button class="btn btn-op" onclick="add('→')">→</button>

        <!-- Parênteses, Bicondicional e Constantes -->
        <button class="btn" onclick="add('(')">(</button>
        <button class="btn" onclick="add(')')">)</button>
        <button class="btn btn-op" onclick="add('↔')">↔</button>
        <button class="btn btn-constant btn-true" onclick="add('[Verdadeiro]')">T</button>
        <button class="btn btn-constant btn-false" onclick="add('[Falso]')">F</button>
        <button class="btn btn-action" onclick="clr()">C</button>

        <!-- Botão de calcular -->
        <button class="btn btn-eval" onclick="verificar()">CALCULAR</button>
    </div>

    <div id="resultado"></div>
</div>

<!-- Scripts -->
<script src="js/logic_prover.js"></script>
<script src="js/app.js"></script>
<script>
    // Função para alternar tema
    function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme') || 'dark';
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        
        // Para dark, remove o atributo (usa :root padrão)
        // Para light, define o atributo
        if (newTheme === 'dark') {
            html.removeAttribute('data-theme');
        } else {
            html.setAttribute('data-theme', newTheme);
        }
        
        localStorage.setItem('theme', newTheme);
        
        // Atualiza o ícone
        const themeIcon = document.getElementById('themeIcon');
        themeIcon.textContent = newTheme === 'light' ? '🌙' : '☀️';
    }
    
    // Carrega o tema salvo ao carregar a página
    document.addEventListener('DOMContentLoaded', function() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        const html = document.documentElement;
        
        // Para dark, remove o atributo (usa :root padrão)
        // Para light, define o atributo
        if (savedTheme === 'dark') {
            html.removeAttribute('data-theme');
        } else {
            html.setAttribute('data-theme', savedTheme);
        }
        
        const themeIcon = document.getElementById('themeIcon');
        themeIcon.textContent = savedTheme === 'light' ? '🌙' : '☀️';
    });
</script>

</body>
</html>
